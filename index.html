<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>moodlist</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   VARIABLES
═══════════════════════════════════════════ */
:root {
  --bg:           #edf0f6;
  --surface:      rgba(255,255,255,0.42);
  --surface-hi:   rgba(255,255,255,0.72);
  --border:       rgba(255,255,255,0.70);
  --shadow:       0 8px 36px rgba(90,105,150,0.12);
  --shadow-lg:    0 24px 80px rgba(90,105,150,0.16);
  --blur:         blur(28px) saturate(180%);
  --blur-heavy:   blur(40px) saturate(200%);
  --text:         #1c1e26;
  --text-2:       rgba(28,30,38,0.52);
  --text-3:       rgba(28,30,38,0.34);
  --accent:       #5b8dee;
  --accent-2:     #a78bfa;
  --r-card:       28px;
  --r-btn:        50px;
  --font-ui:      'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-logo:    'Playfair Display', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══════════════════════════════════════════
   BACKGROUND (z:1)
═══════════════════════════════════════════ */
#bg {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(148deg, #eceff8 0%, #f5f3fb 45%, #eff1f8 100%);
  overflow: hidden;
}
#bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(80,95,140,0.052) 1px, transparent 1px),
    linear-gradient(90deg, rgba(80,95,140,0.052) 1px, transparent 1px);
  background-size: 58px 58px;
}
.blob {
  position: absolute; border-radius: 50%; pointer-events: none;
  animation: blobFloat ease-in-out infinite;
}
.blob-1 {
  width: 660px; height: 500px;
  background: radial-gradient(ellipse, rgba(130,170,255,0.20) 0%, transparent 68%);
  top: -160px; left: -160px; animation-duration: 22s;
}
.blob-2 {
  width: 520px; height: 520px;
  background: radial-gradient(ellipse, rgba(255,155,210,0.17) 0%, transparent 68%);
  bottom: -100px; right: -80px; animation-duration: 28s; animation-delay: -8s;
}
.blob-3 {
  width: 420px; height: 380px;
  background: radial-gradient(ellipse, rgba(175,155,255,0.15) 0%, transparent 68%);
  top: 30%; left: 36%; animation-duration: 19s; animation-delay: -5s;
}
@keyframes blobFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33%       { transform: translate(28px, -22px) scale(1.04); }
  66%       { transform: translate(-18px, 22px) scale(0.97); }
}
#grain {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none; opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 168px;
}

/* ═══════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════ */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex;
  transition: opacity 0.52s cubic-bezier(.4,0,.2,1), transform 0.52s cubic-bezier(.4,0,.2,1);
}
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.985); }

/* ═══════════════════════════════════════════
   SCREEN 1 — CHARACTER CAROUSEL
═══════════════════════════════════════════ */
#screen-select {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px;
}

.s-logo {
  font-family: var(--font-logo);
  font-style: italic; font-weight: 500;
  font-size: 2.1rem; letter-spacing: -0.03em;
  color: rgba(38,42,60,0.72);
  margin-bottom: 6px;
}

.s-sub {
  font-size: 0.875rem; font-weight: 400;
  color: var(--text-2); letter-spacing: -0.01em;
  margin-bottom: 30px;
}

/* ── Carousel ── */
.carousel {
  position: relative;
  width: 100%;
  max-width: 760px;
  height: 460px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.car-stage {
  position: relative;
  width: 100%;
  height: 100%;
}

.car-item {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 270px;
  height: 380px;
  margin-left: -135px;
  margin-top: -190px;
  transition: transform 0.55s cubic-bezier(.4,0,.2,1),
              opacity 0.45s ease,
              filter 0.45s ease;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* card body (glass) */
.car-card {
  width: 100%;
  flex: 1;
  border-radius: 36px;
  background: var(--surface);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.92);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 18px;
}
.car-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, transparent 100%);
  border-radius: 36px 36px 0 0;
  pointer-events: none;
}

.car-img {
  width: 100%; height: 100%;
  display: flex; align-items: flex-end; justify-content: center;
  position: relative;
  z-index: 1;
}
.car-img img {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 10px 26px rgba(80,95,135,0.18));
  pointer-events: none;
}

.car-label {
  margin-top: 14px;
  text-align: center;
}
.char-badge {
  font-size: 0.66rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-3);
  display: block;
}
.char-name {
  font-size: 0.95rem; font-weight: 500;
  color: var(--text); letter-spacing: -0.02em;
  margin-top: 3px;
  display: block;
}

/* Carousel positions */
.car-item.center {
  transform: scale(1);
  opacity: 1; filter: none;
  z-index: 3;
}
.car-item.center:hover .car-card {
  box-shadow: 0 0 0 3px rgba(91,141,238,0.22),
              var(--shadow-lg),
              inset 0 1px 0 rgba(255,255,255,0.95);
}
.car-item.next {
  transform: translateX(220px) scale(0.7);
  opacity: 0.45;
  filter: blur(1px);
  z-index: 2;
}
.car-item.prev {
  transform: translateX(-220px) scale(0.7);
  opacity: 0.45;
  filter: blur(1px);
  z-index: 2;
}

.car-item.next:hover, .car-item.prev:hover {
  opacity: 0.7;
}

/* Carousel nav arrows */
.car-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: var(--text-2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s, transform 0.2s;
  box-shadow: var(--shadow);
}
.car-nav:hover { background: rgba(255,255,255,0.95); color: var(--text); transform: translateY(-50%) scale(1.06); }
.car-prev { left: 10px; }
.car-next { right: 10px; }

.select-hint {
  margin-top: 26px;
  font-size: 0.82rem;
  color: var(--text-3);
  letter-spacing: -0.01em;
}

/* ═══════════════════════════════════════════
   SCREEN 2 — MAIN
═══════════════════════════════════════════ */
#screen-main { position: relative; }

/* Character layers */
.character-bg,
.character-cutout {
  position: absolute;
  left: 50%; bottom: 2vh;
  transform: translateX(-50%);
  width: clamp(280px, 38vw, 580px);
  height: auto;
  display: none;
}
.character-bg {
  z-index: 5;
  opacity: 0.26;
  filter: blur(2.5px) brightness(1.08) saturate(108%);
  pointer-events: none;
}
.character-cutout {
  z-index: 20;
  filter: drop-shadow(0 28px 70px rgba(70,90,130,0.19));
  pointer-events: none;
}

/* Canvas (z:10) */
#canvas { position: absolute; inset: 0; z-index: 10; }

#pl-overlay {
  position: absolute; top: 66px; left: 22px; z-index: 11;
  pointer-events: none; max-width: 230px;
}
.pl-nick {
  font-size: 0.68rem; font-weight: 600;
  letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 3px;
}
.pl-title {
  font-family: var(--font-logo);
  font-style: italic; font-weight: 500;
  font-size: clamp(1rem, 2.6vw, 1.45rem);
  color: rgba(36,40,58,0.78);
  line-height: 1.25; letter-spacing: -0.01em;
}

/* Topbar */
#topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 30;
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
  background: rgba(255,255,255,0.52);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid rgba(255,255,255,0.72);
  box-shadow: 0 1px 0 rgba(0,0,0,0.055);
}
.tb-logo {
  font-family: var(--font-logo);
  font-style: italic; font-weight: 500;
  font-size: 1.28rem; letter-spacing: -0.03em;
  color: rgba(36,40,58,0.72);
}
.tb-right { display: flex; gap: 7px; align-items: center; }

.gpill {
  display: flex; align-items: center; gap: 5px;
  padding: 0 14px; height: 33px;
  border-radius: 20px;
  border: 1px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(12px);
  color: var(--text-2);
  font-family: var(--font-ui);
  font-size: 0.78rem; font-weight: 500;
  letter-spacing: -0.01em;
  cursor: pointer;
  transition: background 0.18s, color 0.18s, transform 0.14s;
  white-space: nowrap;
}
.gpill:hover { background: rgba(255,255,255,0.92); color: var(--text); transform: scale(1.02); }
.gpill.active { background: rgba(91,141,238,0.1); border-color: rgba(91,141,238,0.28); color: var(--accent); }
.gpill svg { flex-shrink: 0; }

/* Edit panel */
#edit-panel {
  position: absolute;
  top: 64px; right: 10px; bottom: 10px; z-index: 30;
  width: min(332px, calc(100vw - 20px));
  border-radius: var(--r-card);
  background: rgba(255,255,255,0.56);
  backdrop-filter: var(--blur-heavy);
  -webkit-backdrop-filter: var(--blur-heavy);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.92);
  display: flex; flex-direction: column;
  overflow: hidden;
  transform: translateX(calc(100% + 18px));
  transition: transform 0.4s cubic-bezier(.4,0,.2,1);
}
#edit-panel.open { transform: translateX(0); }

.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 14px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  flex-shrink: 0;
}
.panel-head-title { font-size: 0.88rem; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.btn-panel-close {
  width: 24px; height: 24px; border-radius: 50%;
  border: none; background: rgba(0,0,0,0.07);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-2);
  transition: background 0.18s;
}
.btn-panel-close:hover { background: rgba(0,0,0,0.13); }

.panel-body { flex: 1; overflow-y: auto; padding: 16px 16px 18px; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 2px; }

.ps { margin-bottom: 16px; }
.plabel {
  font-size: 0.67rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 6px;
}
.pinput {
  width: 100%; padding: 10px 13px;
  border-radius: 13px;
  border: 1px solid rgba(0,0,0,0.09);
  background: rgba(255,255,255,0.72);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 0.875rem; letter-spacing: -0.01em;
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
}
.pinput:focus {
  border-color: rgba(91,141,238,0.38);
  box-shadow: 0 0 0 3px rgba(91,141,238,0.1);
  background: rgba(255,255,255,0.92);
}
.pinput::placeholder { color: rgba(0,0,0,0.24); }
.pdiv { height: 1px; background: rgba(0,0,0,0.065); margin: 4px 0 16px; }

.orbit-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 13px; border-radius: 13px;
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(0,0,0,0.07);
  cursor: pointer; transition: background 0.18s;
  margin-bottom: 16px; user-select: none;
}
.orbit-row:hover { background: rgba(255,255,255,0.82); }
.orbit-lbl { font-size: 0.84rem; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
.sw {
  width: 38px; height: 22px; border-radius: 11px;
  background: rgba(0,0,0,0.14); position: relative;
  transition: background 0.24s; flex-shrink: 0;
}
.sw::after {
  content: ''; position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px; border-radius: 50%;
  background: white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.22);
  transition: transform 0.24s;
}
.orbit-row.active .sw { background: var(--accent); }
.orbit-row.active .sw::after { transform: translateX(16px); }

.song-count-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.scount {
  font-size: 0.67rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-3);
}
.scount-val { color: var(--text-2); }

.song-list-p { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.song-row-p {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 12px;
  background: rgba(255,255,255,0.56);
  border: 1px solid rgba(0,0,0,0.058);
}
.sthumb {
  width: 38px; height: 27px; border-radius: 7px;
  object-fit: cover; flex-shrink: 0;
  background: rgba(0,0,0,0.05);
}
.sinfo { flex: 1; min-width: 0; }
.stitle {
  font-size: 0.79rem; font-weight: 500;
  color: var(--text); letter-spacing: -0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.smemo {
  font-size: 0.68rem; color: var(--text-3); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.btn-sdel {
  background: none; border: none;
  color: rgba(0,0,0,0.18); cursor: pointer;
  padding: 2px 5px; border-radius: 6px;
  transition: color 0.18s, background 0.18s; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.btn-sdel:hover { color: #d93636; background: rgba(217,54,54,0.09); }

.song-empty {
  text-align: center; padding: 14px 0;
  font-size: 0.8rem; color: var(--text-3);
  letter-spacing: -0.01em;
}

.btn-add-song {
  width: 100%; padding: 10px;
  border-radius: 13px;
  border: 1px dashed rgba(91,141,238,0.32);
  background: rgba(91,141,238,0.046);
  color: var(--accent);
  font-family: var(--font-ui);
  font-size: 0.85rem; font-weight: 500;
  letter-spacing: -0.01em; cursor: pointer;
  transition: background 0.18s, border-color 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.btn-add-song:hover { background: rgba(91,141,238,0.1); border-color: rgba(91,141,238,0.48); }

.btn-share {
  width: 100%; padding: 12px;
  border-radius: 15px; border: none;
  background: linear-gradient(135deg, #5b8dee 0%, #7c4dff 100%);
  color: white;
  font-family: var(--font-ui);
  font-size: 0.9rem; font-weight: 600;
  letter-spacing: -0.01em; cursor: pointer;
  box-shadow: 0 6px 22px rgba(91,141,238,0.32);
  transition: transform 0.18s, box-shadow 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-share:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(91,141,238,0.42); }

.share-url-box {
  display: none; margin-top: 9px;
  padding: 9px 11px; border-radius: 11px;
  background: rgba(255,255,255,0.62);
  border: 1px solid rgba(0,0,0,0.07);
  font-size: 0.7rem; color: var(--text-2);
  word-break: break-all; cursor: pointer;
  transition: background 0.18s; line-height: 1.55;
}
.share-url-box:hover { background: rgba(255,255,255,0.9); }
.share-url-box.visible { display: block; }

.btn-char-switch {
  width: 100%; padding: 10px; border-radius: 13px;
  border: 1px solid rgba(0,0,0,0.09);
  background: rgba(255,255,255,0.52);
  color: var(--text-2); font-family: var(--font-ui);
  font-size: 0.84rem; font-weight: 500;
  letter-spacing: -0.01em; cursor: pointer;
  transition: background 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-char-switch:hover { background: rgba(255,255,255,0.88); color: var(--text); }

#view-banner {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
  padding: 13px 20px;
  display: none; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.56);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-top: 1px solid rgba(255,255,255,0.72);
}
#view-banner.show { display: flex; }
.vb-text { font-size: 0.82rem; color: var(--text-2); letter-spacing: -0.01em; }
.btn-own {
  padding: 8px 18px; border-radius: var(--r-btn);
  border: 1px solid rgba(91,141,238,0.28);
  background: rgba(91,141,238,0.08);
  color: var(--accent); font-family: var(--font-ui);
  font-size: 0.8rem; font-weight: 600;
  letter-spacing: -0.01em; cursor: pointer;
  transition: background 0.18s;
}
.btn-own:hover { background: rgba(91,141,238,0.18); }

/* Music cards */
.music-card {
  position: absolute;
  width: 194px;
  border-radius: var(--r-card);
  background: rgba(255,255,255,0.34);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.62);
  box-shadow: 0 24px 80px rgba(110,125,170,0.16), inset 0 1px 0 rgba(255,255,255,0.82);
  padding: 12px;
  cursor: grab;
  user-select: none;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
  overflow: hidden;
}
.music-card:active { cursor: grabbing; }
.music-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 44%;
  background: linear-gradient(180deg, rgba(255,255,255,0.52) 0%, transparent 100%);
  border-radius: 28px 28px 0 0;
  pointer-events: none;
}
.music-card:hover {
  transform: scale(1.04) translateY(-3px);
  box-shadow: 0 30px 96px rgba(100,120,175,0.2), inset 0 1px 0 rgba(255,255,255,0.92);
}

.c-thumb {
  width: 100%; height: 100px;
  border-radius: 17px; overflow: hidden;
  background: rgba(0,0,0,0.04);
  position: relative;
}
.c-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.c-body { margin-top: 9px; }
.c-title {
  font-size: 0.81rem; font-weight: 600;
  color: var(--text); letter-spacing: -0.02em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.c-memo {
  font-size: 0.69rem; color: var(--text-2); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-style: italic; letter-spacing: -0.01em;
}
.c-foot {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px;
}
.c-play {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  text-decoration: none;
  box-shadow: 0 4px 14px rgba(91,141,238,0.36);
  transition: transform 0.16s, box-shadow 0.16s;
  pointer-events: all;
}
.c-play:hover { transform: scale(1.13); box-shadow: 0 6px 20px rgba(91,141,238,0.5); }
.c-play svg { color: white; }
.c-del {
  background: none; border: none;
  color: rgba(0,0,0,0.16); cursor: pointer;
  padding: 2px 5px; border-radius: 6px;
  transition: color 0.18s, background 0.18s;
  pointer-events: all;
  display: flex; align-items: center; justify-content: center;
}
.c-del:hover { color: #d93636; background: rgba(217,54,54,0.09); }

/* Modal */
#modal-add {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: rgba(180,190,215,0.28);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.26s;
}
#modal-add.open { opacity: 1; pointer-events: all; }

.mbox {
  width: min(390px, 93vw);
  border-radius: 32px;
  background: rgba(255,255,255,0.74);
  backdrop-filter: var(--blur-heavy);
  -webkit-backdrop-filter: var(--blur-heavy);
  border: 1px solid rgba(255,255,255,0.88);
  box-shadow: var(--shadow-lg), inset 0 1px 0 white;
  padding: 26px 22px 20px;
  display: flex; flex-direction: column; gap: 13px;
}
.mbox-title { font-size: 1.12rem; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
.thumb-prev {
  width: 100%; height: 108px; border-radius: 17px;
  overflow: hidden;
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.07);
  display: flex; align-items: center; justify-content: center;
}
.thumb-prev img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-ph { font-size: 0.75rem; color: var(--text-3); font-weight: 500; }
.m-acts { display: flex; gap: 9px; margin-top: 2px; }
.btn-mcancel {
  flex: 1; padding: 12px; border-radius: 13px;
  border: 1px solid rgba(0,0,0,0.09);
  background: rgba(255,255,255,0.52);
  color: var(--text-2); font-family: var(--font-ui);
  font-size: 0.875rem; font-weight: 500;
  letter-spacing: -0.01em; cursor: pointer;
  transition: background 0.18s;
}
.btn-mcancel:hover { background: rgba(255,255,255,0.9); }
.btn-madd {
  flex: 2; padding: 12px; border-radius: 13px;
  border: none;
  background: linear-gradient(135deg, #5b8dee, #7c4dff);
  color: white; font-family: var(--font-ui);
  font-size: 0.875rem; font-weight: 600;
  letter-spacing: -0.01em; cursor: pointer;
  box-shadow: 0 4px 16px rgba(91,141,238,0.32);
  transition: transform 0.16s, box-shadow 0.16s;
}
.btn-madd:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(91,141,238,0.42); }

/* Toast */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  z-index: 999;
  padding: 9px 22px; border-radius: var(--r-btn);
  background: rgba(22,24,34,0.84);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  color: white; font-family: var(--font-ui);
  font-size: 0.83rem; font-weight: 500;
  letter-spacing: -0.01em; white-space: nowrap;
  pointer-events: none; opacity: 0;
  transition: opacity 0.26s, transform 0.26s;
  box-shadow: 0 8px 28px rgba(0,0,0,0.22);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Mobile */
@media (max-width: 640px) {
  .carousel { height: 420px; }
  .car-item { width: 230px; height: 340px; margin-left: -115px; margin-top: -170px; }
  .car-item.next { transform: translateX(180px) scale(0.65); }
  .car-item.prev { transform: translateX(-180px) scale(0.65); }
  .car-nav { width: 40px; height: 40px; }
  .car-prev { left: 4px; }

  .character-bg, .character-cutout { width: clamp(220px, 72vw, 360px); }

  #edit-panel { width: calc(100vw - 16px); right: 8px; top: 58px; bottom: 8px; }
  .s-logo { font-size: 1.75rem; }
}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div id="bg">
  <div id="bg-grid"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

<!-- ══════════════════════════════════════════
     SCREEN 1 — CAROUSEL CHARACTER SELECT
═══════════════════════════════════════════ -->
<div class="screen" id="screen-select">
  <p class="s-logo">moodlist</p>

  <div class="carousel">

    <div class="car-stage" id="car-stage">

      <div class="car-item" data-idx="1" onclick="carouselTap(1)">
        <div class="car-card">

    <button class="car-nav car-next" onclick="carouselNext()" aria-label="다음">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <p class="select-hint">캐릭터를 눌러 시작하세요</p>

<!-- ══════════════════════════════════════════
     SCREEN 2 — MAIN
═══════════════════════════════════════════ -->
<div class="screen hidden" id="screen-main">

  <!-- z:5 — character background -->
  <img class="character-bg" id="char-bg" alt="">

  <!-- z:10 — cards canvas -->
  <div id="canvas">
    <div id="pl-overlay">
      <div class="pl-nick" id="pl-nick"></div>

  </div>

  <!-- z:20 — character cutout (in front of cards) -->

  <!-- z:30 — topbar -->
  <div id="topbar">
    <span class="tb-logo">moodlist</span>
    <div class="tb-right">
      <button class="gpill" id="btn-orbit" onclick="toggleOrbit()">

        </svg>

      </button>
      <button class="gpill" id="btn-edit" onclick="togglePanel()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
        </svg>
        편집
      </button>
    </div>
  </div>

  <!-- z:30 — edit panel -->
  <div id="edit-panel">
    <div class="panel-head">
      <span class="panel-head-title">편집</span>
      <button class="btn-panel-close" onclick="closePanel()">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>
        </svg>
      </button>
    </div>

    <div class="panel-body">
      <div class="ps">
        <div class="plabel">닉네임</div>

      <div class="ps">

        <input class="pinput" id="inp-title" type="text" maxlength="40"
               placeholder="ex) 비 오는 날 듣는 노래들" oninput="updateOverlay()">
      </div>

      <div class="pdiv"></div>

      <div class="orbit-row" id="orbit-row" onclick="toggleOrbit()">

      </div>

      <div class="song-count-row">
        <span class="scount">플레이리스트 <span class="scount-val" id="s-count">0</span> / 8</span>
      </div>
      <div class="song-list-p" id="song-list-p">

      </div>

      <button class="btn-add-song" id="btn-add-song" onclick="openAddModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        노래 추가
      </button>

      <div class="pdiv"></div>

      <div class="ps">
        <div class="plabel">캐릭터 변경</div>
        <button class="btn-char-switch" onclick="goSelect()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          </svg>
          캐릭터 다시 선택
        </button>
      </div>

      <div class="pdiv"></div>

      <div class="ps">
        <button class="btn-share" onclick="generateShare()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>

  <!-- view-only banner -->

    <span class="vb-text">공유된 플레이리스트입니다</span>
    <button class="btn-own" onclick="makeOwn()">나도 만들기</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal-add">
  <div class="mbox">
    <div class="mbox-title">노래 추가</div>
    <div>
      <div class="plabel">YouTube URL</div>
      <input class="pinput" id="m-url" type="url"
             placeholder="https://www.youtube.com/watch?v=..." oninput="previewThumb()">
    </div>
    <div class="thumb-prev" id="m-thumb">
      <span class="thumb-ph">YouTube URL을 입력하면 썸네일이 표시됩니다</span>
    </div>
    <div>
      <div class="plabel">노래 제목</div>
      <input class="pinput" id="m-stitle" type="text" maxlength="50" placeholder="ex) 봄날">
    </div>
    <div>
      <div class="plabel">감성 메모</div>
      <input class="pinput" id="m-memo" type="text" maxlength="60" placeholder="ex) 창문 열고 들으면 딱인 노래">
    </div>
    <div class="m-acts">
      <button class="btn-mcancel" onclick="closeAddModal()">취소</button>
      <button class="btn-madd" onclick="addSong()">추가</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let state = {
  selectedCharacter: null,
  nickname: '',
  playlistTitle: '',
  songs: [],
  isViewOnly: false,
};

let carouselIdx = 0;
let orbitActive = false;
let orbitAngle  = 0;
let orbitRAF    = null;

/* ═══════════════════════════════════════════
   IMAGE LOADER WITH FALLBACK
   - paths 배열을 순서대로 시도, 첫 성공한 이미지를 표시
   - 모두 실패하면 hide
═══════════════════════════════════════════ */
function loadImageWithFallback(imgEl, paths) {
  let i = 0;
  imgEl.style.display = '';
  function next() {
    if (i >= paths.length) {
      imgEl.style.display = 'none';
      return;
    }
    imgEl.src = paths[i++];
  }
  imgEl.onload  = function() {
    imgEl.style.removeProperty('display');
  };
  imgEl.onerror = next;
  next();
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  // 1) Carousel character images — fallback chain
  document.querySelectorAll('.car-item img[data-char]').forEach(img => {
    const n = img.dataset.char;
    loadImageWithFallback(img, [
      `character_0${n}_cutout.png`,
      `character_0${n}.png`
    ]);
  });

  // 2) Check shared URL data
  const params = new URLSearchParams(location.search);
  const raw = params.get('data');
  if (raw) {
    try {
      const decoded = JSON.parse(decodeURIComponent(atob(raw)));
      state = { ...decoded, isViewOnly: true };
      showMain();
      return;
    } catch(e) {
      console.warn('URL data parse error', e);
    }
  }

  // 3) Restore localStorage draft
  try {
    const draft = JSON.parse(localStorage.getItem('moodlist_draft') || 'null');
    if (draft && draft.selectedCharacter) {
      state = { ...draft, isViewOnly: false };
      carouselIdx = state.selectedCharacter - 1;
    }
  } catch(e) {}

  carouselRender();
});

/* ═══════════════════════════════════════════
   CAROUSEL
═══════════════════════════════════════════ */
function carouselRender() {
  const items = document.querySelectorAll('.car-item');
  const total = items.length;
  items.forEach((item, i) => {
    item.classList.remove('center', 'prev', 'next');
    const off = ((i - carouselIdx) % total + total) % total;
    if (off === 0)      item.classList.add('center');
    else if (off === 1) item.classList.add('next');
    else                item.classList.add('prev');
  });
}

function carouselPrev() {
  const total = document.querySelectorAll('.car-item').length;
  carouselIdx = (carouselIdx - 1 + total) % total;
  carouselRender();
}

function carouselNext() {
  const total = document.querySelectorAll('.car-item').length;
  carouselIdx = (carouselIdx + 1) % total;
  carouselRender();
}

function carouselTap(idx) {
  if (idx === carouselIdx) {
    // 중앙 캐릭터 탭 → 바로 메인 진입
    state.selectedCharacter = idx + 1;
    saveDraft();
    showMain();
  } else {
    // 옆 캐릭터 탭 → 회전
    carouselIdx = idx;
    carouselRender();
  }
}

// Keyboard nav for carousel
document.addEventListener('keydown', e => {
  if (!document.getElementById('screen-select').classList.contains('hidden')) {
    if (e.key === 'ArrowLeft')  carouselPrev();
    if (e.key === 'ArrowRight') carouselNext();
    if (e.key === 'Enter') {
      state.selectedCharacter = carouselIdx + 1;
      saveDraft();
      showMain();
    }
  }
  if (e.key === 'Escape') {
    closeAddModal();
    closePanel();
  }
});

/* ═══════════════════════════════════════════
   MAIN SCREEN
═══════════════════════════════════════════ */
function showMain() {
  document.getElementById('screen-select').classList.add('hidden');
  document.getElementById('screen-main').classList.remove('hidden');

  applyCharacter();
  updateOverlay();
  updatePanelInputs();
  renderCards();

  if (state.isViewOnly) {
    document.getElementById('view-banner').classList.add('show');
    document.getElementById('btn-edit').style.display = 'none';
    document.getElementById('btn-orbit').style.display = 'none';
    orbitActive = false;
    toggleOrbit();
  }
}

function goSelect() {
  stopOrbit();
  closePanel();
  document.getElementById('screen-main').classList.add('hidden');
  document.getElementById('screen-select').classList.remove('hidden');
  if (state.selectedCharacter) {
    carouselIdx = state.selectedCharacter - 1;
    carouselRender();
  }
}

/* ═══════════════════════════════════════════
   APPLY CHARACTER LAYERS
   - cutout: ideal _cutout.png → fallback to character_0X.png
   - bg    : ideal _bg.png     → fallback to character_0X.png
═══════════════════════════════════════════ */
function applyCharacter() {
  const n = state.selectedCharacter || 1;
  loadImageWithFallback(
    document.getElementById('char-cutout'),
    [`character_0${n}_cutout.png`, `character_0${n}.png`]
  );
  loadImageWithFallback(
    document.getElementById('char-bg'),
    [`character_0${n}_bg.png`, `character_0${n}.png`]
  );
}

/* ═══════════════════════════════════════════
   OVERLAY
═══════════════════════════════════════════ */
function updateOverlay() {
  state.nickname      = document.getElementById('inp-nick').value.trim();
  state.playlistTitle = document.getElementById('inp-title').value.trim();
  document.getElementById('pl-nick').textContent  = state.nickname  || '';
  document.getElementById('pl-title').textContent = state.playlistTitle || '나의 플레이리스트';
  saveDraft();
}

function updatePanelInputs() {
  document.getElementById('inp-nick').value  = state.nickname || '';
  document.getElementById('inp-title').value = state.playlistTitle || '';
}

/* ═══════════════════════════════════════════
   PANEL
═══════════════════════════════════════════ */
function togglePanel() { document.getElementById('edit-panel').classList.toggle('open'); }
function closePanel()  { document.getElementById('edit-panel').classList.remove('open'); }

/* ═══════════════════════════════════════════
   YOUTUBE UTILS
═══════════════════════════════════════════ */
function extractVideoId(url) {
  try {
    const u = new URL(url);
    if (u.searchParams.get('v')) return u.searchParams.get('v');
    if (u.hostname === 'youtu.be') return u.pathname.slice(1).split('?')[0];
    const m = u.pathname.match(/\/(?:embed|shorts|v)\/([^/?&]+)/);
    if (m) return m[1];
  } catch(e) {}
  return null;
}

function thumbUrl(videoId) {
  return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
}

/* ═══════════════════════════════════════════
   ADD SONG MODAL
═══════════════════════════════════════════ */
function openAddModal() {
  if (state.songs.length >= 8) { showToast('최대 8곡까지 추가할 수 있어요'); return; }
  document.getElementById('m-url').value    = '';
  document.getElementById('m-stitle').value = '';
  document.getElementById('m-memo').value   = '';
  resetThumb();
  document.getElementById('modal-add').classList.add('open');
  setTimeout(() => document.getElementById('m-url').focus(), 100);
}

function closeAddModal() {
  document.getElementById('modal-add').classList.remove('open');
}

function previewThumb() {
  const vid = extractVideoId(document.getElementById('m-url').value.trim());
  const box = document.getElementById('m-thumb');
  if (vid) {
    box.innerHTML = `<img src="${thumbUrl(vid)}" alt="thumb"
      onerror="this.parentElement.innerHTML='<span class=thumb-ph>썸네일을 불러올 수 없어요</span>'">`;
  } else {
    resetThumb();
  }
}

function resetThumb() {
  document.getElementById('m-thumb').innerHTML =
    '<span class="thumb-ph">YouTube URL을 입력하면 썸네일이 표시됩니다</span>';
}

function addSong() {
  const url     = document.getElementById('m-url').value.trim();
  const title   = document.getElementById('m-stitle').value.trim();
  const memo    = document.getElementById('m-memo').value.trim();
  const videoId = extractVideoId(url);

  if (!url)     { showToast('YouTube URL을 입력해주세요'); return; }
  if (!videoId) { showToast('유효한 YouTube 링크가 아닙니다'); return; }
  if (!title)   { showToast('노래 제목을 입력해주세요'); return; }

  const canvas = document.getElementById('canvas');
  const cw = canvas.offsetWidth, ch = canvas.offsetHeight;

  const zones = [
    { x: cw * 0.04, y: ch * 0.10 },
    { x: cw * 0.62, y: ch * 0.08 },
    { x: cw * 0.04, y: ch * 0.48 },
    { x: cw * 0.62, y: ch * 0.46 },
    { x: cw * 0.30, y: ch * 0.05 },
    { x: cw * 0.04, y: ch * 0.78 },
    { x: cw * 0.62, y: ch * 0.76 },
    { x: cw * 0.30, y: ch * 0.72 },
  ];

  const idx = state.songs.length % zones.length;
  const z   = zones[idx];
  const jitter = () => (Math.random() - 0.5) * 36;

  const song = {
    id: Date.now().toString(),
    videoId, title, memo,
    x: clamp(z.x + jitter(), 4, cw - 200),
    y: clamp(z.y + jitter(), 58, ch - 190),
  };

  state.songs.push(song);
  closeAddModal();
  renderCards();
  renderSongPanel();
  saveDraft();
  showToast(`"${title}" 추가됐어요`);
}

function deleteSong(id) {
  state.songs = state.songs.filter(s => s.id !== id);
  renderCards();
  renderSongPanel();
  saveDraft();
}

/* ═══════════════════════════════════════════
   RENDER CARDS
═══════════════════════════════════════════ */
function renderCards() {
  document.querySelectorAll('.music-card').forEach(c => c.remove());
  state.songs.forEach(song => {
    const card = buildCard(song);
    document.getElementById('canvas').appendChild(card);
    card.style.left = song.x + 'px';
    card.style.top  = song.y + 'px';
    if (!state.isViewOnly) makeDraggable(card, song);
  });
  renderSongPanel();
}

function buildCard(song) {
  const card = document.createElement('div');
  card.className = 'music-card';
  card.dataset.id = song.id;
  card.innerHTML = `
    <div class="c-thumb">
      <img src="${thumbUrl(song.videoId)}" alt="${esc(song.title)}"
           onerror="this.style.opacity='0'">
    </div>
    <div class="c-body">
      <div class="c-title">${esc(song.title)}</div>
      ${song.memo ? `<div class="c-memo">${esc(song.memo)}</div>` : ''}
    </div>
    <div class="c-foot">
      <a class="c-play" href="https://www.youtube.com/watch?v=${song.videoId}"
         target="_blank" rel="noopener noreferrer" title="YouTube에서 재생">
        <svg width="10" height="10" viewBox="0 0 12 12">
          <polygon points="3,1.5 10.5,6 3,10.5" fill="white"/>
        </svg>
      </a>
      ${!state.isViewOnly ? `
        <button class="c-del" onclick="deleteSong('${song.id}')" title="삭제">
          <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>
          </svg>
        </button>` : ''}
    </div>
  `;
  return card;
}

function renderSongPanel() {
  const list   = document.getElementById('song-list-p');
  const countEl = document.getElementById('s-count');
  const addBtn = document.getElementById('btn-add-song');

  countEl.textContent = state.songs.length;
  if (addBtn) addBtn.style.display = state.songs.length >= 8 ? 'none' : 'flex';

  if (!state.songs.length) {
    list.innerHTML = '<div class="song-empty">아직 추가된 노래가 없어요</div>';
    return;
  }

  list.innerHTML = state.songs.map(s => `
    <div class="song-row-p">
      <img class="sthumb" src="${thumbUrl(s.videoId)}" alt="" onerror="this.style.opacity='0'">
      <div class="sinfo">
        <div class="stitle">${esc(s.title)}</div>
        ${s.memo ? `<div class="smemo">${esc(s.memo)}</div>` : ''}
      </div>
      ${!state.isViewOnly ? `
        <button class="btn-sdel" onclick="deleteSong('${s.id}')">
          <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>
          </svg>
        </button>` : ''}
    </div>
  `).join('');
}

/* ═══════════════════════════════════════════
   DRAG & DROP
═══════════════════════════════════════════ */
function makeDraggable(el, song) {
  let dragging = false, sx, sy, ox, oy;

  function down(e) {
    if (e.target.closest('a') || e.target.closest('button')) return;
    if (orbitActive) return;
    dragging = true;
    el.style.transition = 'none';
    el.style.zIndex = '50';
    const pt = e.touches ? e.touches[0] : e;
    sx = pt.clientX; sy = pt.clientY;
    ox = parseInt(el.style.left) || 0;
    oy = parseInt(el.style.top)  || 0;
    e.preventDefault();
  }
  function move(e) {
    if (!dragging) return;
    const pt = e.touches ? e.touches[0] : e;
    el.style.left = (ox + pt.clientX - sx) + 'px';
    el.style.top  = (oy + pt.clientY - sy) + 'px';
    e.preventDefault();
  }
  function up() {
    if (!dragging) return;
    dragging = false;
    el.style.transition = '';
    el.style.zIndex = '';
    song.x = parseInt(el.style.left) || 0;
    song.y = parseInt(el.style.top)  || 0;
    saveDraft();
  }

  el.addEventListener('mousedown',  down,  { passive: false });
  el.addEventListener('touchstart', down,  { passive: false });
  window.addEventListener('mousemove',  move, { passive: false });
  window.addEventListener('touchmove',  move, { passive: false });
  window.addEventListener('mouseup',    up);
  window.addEventListener('touchend',   up);
}

/* ═══════════════════════════════════════════
   ORBIT
═══════════════════════════════════════════ */
function toggleOrbit() {
  orbitActive = !orbitActive;
  document.getElementById('btn-orbit').classList.toggle('active', orbitActive);
  const row = document.getElementById('orbit-row');
  if (row) row.classList.toggle('active', orbitActive);
  if (orbitActive) startOrbit();
  else stopOrbit();
}

function startOrbit() {
  if (orbitRAF) cancelAnimationFrame(orbitRAF);
  function tick() {
    orbitAngle += 0.0028;
    const canvas = document.getElementById('canvas');
    const cw = canvas.offsetWidth;
    const ch = canvas.offsetHeight;
    const cx = cw / 2 - 97;
    const cy = ch * 0.44 - 90;
    const rx = clamp(cw * 0.36, 150, 310);
    const ry = clamp(ch * 0.24, 90, 200);

    const cards = document.querySelectorAll('.music-card');
    const n = cards.length;

    cards.forEach((card, i) => {
      const angle = orbitAngle + (i / n) * Math.PI * 2;
      const tx = cx + Math.cos(angle) * rx;
      const ty = cy + Math.sin(angle) * ry;
      card.style.transition = 'left 1.1s cubic-bezier(.4,0,.2,1), top 1.1s cubic-bezier(.4,0,.2,1)';
      card.style.left = clamp(tx, 4, cw - 200) + 'px';
      card.style.top  = clamp(ty, 58, ch - 190) + 'px';
    });
    orbitRAF = requestAnimationFrame(tick);
  }
  tick();
}

function stopOrbit() {
  if (orbitRAF) { cancelAnimationFrame(orbitRAF); orbitRAF = null; }
  document.querySelectorAll('.music-card').forEach(card => {
    const song = state.songs.find(s => s.id === card.dataset.id);
    if (song) {
      song.x = parseInt(card.style.left) || 0;
      song.y = parseInt(card.style.top)  || 0;
    }
    card.style.transition = '';
  });
  saveDraft();
}

/* ═══════════════════════════════════════════
   SHARE URL
═══════════════════════════════════════════ */
function generateShare() {
  document.querySelectorAll('.music-card').forEach(card => {
    const song = state.songs.find(s => s.id === card.dataset.id);
    if (song) {
      song.x = parseInt(card.style.left) || 0;
      song.y = parseInt(card.style.top)  || 0;
    }
  });

  const payload = {
    nickname:          state.nickname,
    playlistTitle:     state.playlistTitle,
    selectedCharacter: state.selectedCharacter,
    songs:             state.songs,
  };

  const encoded = btoa(encodeURIComponent(JSON.stringify(payload)));
  const url = `${location.origin}${location.pathname}?data=${encoded}`;

  const box = document.getElementById('share-box');
  box.dataset.url = url;
  box.textContent = '클릭하여 링크 복사 — ' + url.slice(0, 52) + (url.length > 52 ? '...' : '');
  box.classList.add('visible');
  showToast('공유 링크가 생성됐어요');
}

function copyShare() {
  const url = document.getElementById('share-box').dataset.url;
  if (!url) return;
  navigator.clipboard.writeText(url)
    .then(()  => showToast('링크가 복사됐어요'))
    .catch(()  => { prompt('아래 링크를 복사하세요:', url); });
}

/* ═══════════════════════════════════════════
   VIEW-ONLY → MAKE OWN
═══════════════════════════════════════════ */
function makeOwn() {
  stopOrbit();
  history.replaceState({}, '', location.pathname);
  state.isViewOnly = false;
  document.getElementById('view-banner').classList.remove('show');
  document.getElementById('btn-edit').style.display = '';
  document.getElementById('btn-orbit').style.display = '';
  renderCards();
  closePanel();
  setTimeout(() => togglePanel(), 200);
  showToast('이제 자유롭게 편집해보세요');
}

/* ═══════════════════════════════════════════
   LOCALSTORAGE DRAFT
═══════════════════════════════════════════ */
function saveDraft() {
  if (state.isViewOnly) return;
  try {
    localStorage.setItem('moodlist_draft', JSON.stringify({
      nickname:          state.nickname,
      playlistTitle:     state.playlistTitle,
      selectedCharacter: state.selectedCharacter,
      songs:             state.songs,
    }));
  } catch(e) {}
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }

document.getElementById('modal-add').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});
</script>
